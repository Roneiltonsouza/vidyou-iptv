<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VidYou IPTV PRO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.10/hls.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { 
            padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; 
            background: linear-gradient(90deg, #4b0082, #ff4500); 
            border-bottom: 2px solid #ff4500; z-index: 100;
        }
        .btn-header { background: #000; border: 1px solid #ff4500; color: #ff4500; padding: 8px 12px; font-weight: bold; border-radius: 4px; cursor: pointer; }

        #player-wrapper { position: relative; width: 100%; flex: 1; background: #000; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: contain; }

        .seta-canais {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0, 0, 0, 0.7); color: #ff4500; border: 2px solid #ff4500;
            width: 50px; height: 50px; border-radius: 50%; cursor: pointer; font-size: 20px;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.5s; opacity: 1;
        }
        .seta-canais.invisivel { opacity: 0; pointer-events: none; }

        #gaveta {
            position: absolute; top: 0; left: -300px; width: 280px; height: 100%;
            background: rgba(10, 10, 10, 0.98); z-index: 2000; transition: 0.4s;
            border-right: 3px solid #ff4500; display: flex; flex-direction: column;
        }
        #gaveta.ativa { left: 0; }

        /* TABS DA VERSÃO ANTIGA DENTRO DA GAVETA */
        .tabs { display: flex; background: #111; padding: 5px; gap: 2px; }
        .tab-btn { flex: 1; padding: 10px 5px; border: none; background: #222; color: #fff; font-size: 0.7rem; font-weight: bold; cursor: pointer; }
        .tab-btn.active { background: #ff4500; color: #000; }

        #itens-canais { flex: 1; overflow-y: auto; padding: 5px; }
        .canal-item { padding: 12px; border-bottom: 1px solid #222; cursor: pointer; font-size: 0.9rem; border-left: 3px solid transparent; }
        .canal-item:active { background: #ff4500; color: #000; border-left: 3px solid #fff; }
        
        .status-msg { padding: 10px; font-size: 0.7rem; color: #ff4500; text-align: center; background: #000; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: 900; color: #fff; font-size: 1.4rem;">VidYou <span style="color:#000">IPTV</span></div>
    <div style="display:flex; gap:10px;">
        <button class="btn-header" onclick="toggleFS()">⛶ TELA CHEIA</button>
        <button class="btn-header" onclick="document.getElementById('file-input').click()">📁 ABRIR</button>
    </div>
    <input type="file" id="file-input" style="display:none" onchange="carregarLocal(event)">
</header>

<div id="player-wrapper">
    <video id="main-video" controls playsinline></video>
    
    <button class="seta-canais" id="botaoSeta" onclick="abrirGaveta()">▼</button>
    
    <div id="gaveta">
        <div style="padding:15px; background:#ff4500; color:#000; font-weight:bold; cursor:pointer; text-align:center;" onclick="fecharGaveta()">FECHAR [X]</div>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="render('canais', this)">CANAIS</button>
            <button class="tab-btn" onclick="render('filmes', this)">FILMES</button>
            <button class="tab-btn" onclick="render('series', this)">SÉRIES</button>
        </div>

        <div class="status-msg" id="status">Aguardando lista...</div>
        <div id="itens-canais"></div>
    </div>
</div>

<script>
    const video = document.getElementById('main-video');
    const status = document.getElementById('status');
    const listaDiv = document.getElementById('itens-canais');
    const seta = document.getElementById('botaoSeta');
    let hls = null;
    let dados = { canais: [], filmes: [], series: [] };
    let timerUI;

    // Lógica da Seta (Sumir/Aparecer)
    function resetTimer() {
        seta.classList.remove('invisivel');
        clearTimeout(timerUI);
        timerUI = setTimeout(() => {
            if(!document.getElementById('gaveta').classList.contains('ativa')) {
                seta.classList.add('invisivel');
            }
        }, 5000);
    }
    document.getElementById('player-wrapper').addEventListener('mousemove', resetTimer);
    document.getElementById('player-wrapper').addEventListener('touchstart', resetTimer);

    function abrirGaveta() { document.getElementById('gaveta').classList.add('ativa'); }
    function fecharGaveta() { document.getElementById('gaveta').classList.remove('ativa'); resetTimer(); }

    function toggleFS() {
        const wrap = document.getElementById('player-wrapper');
        if (!document.fullscreenElement) wrap.requestFullscreen().catch(err => {});
        else document.exitFullscreen();
    }

    // SISTEMA DE CARREGAMENTO DA VERSÃO ANTIGA (O QUE FUNCIONA)
    async function carregarM3U(url) {
        try {
            status.innerText = "Sincronizando conteúdo...";
            const response = await fetch(url);
            const text = await response.text();
            
            dados = { canais: [], filmes: [], series: [] };
            const linhas = text.split('\n');

            for (let i = 0; i < linhas.length; i++) {
                if (linhas[i].includes('#EXTINF')) {
                    const info = linhas[i].toLowerCase();
                    const nome = linhas[i].split(',')[1] || "Sem nome";
                    const link = linhas[i+1]?.trim();
                    if (!link || !link.startsWith('http')) continue;

                    const item = { nome, link };
                    if (info.includes('filme')) dados.filmes.push(item);
                    else if (info.includes('serie')) dados.series.push(item);
                    else dados.canais.push(item);
                }
            }
            status.innerText = "Sincronizado!";
            render('canais');
            abrirGaveta();
        } catch (e) {
            status.innerText = "Erro ao carregar lista.";
        }
    }

    function render(cat, btn) {
        if(btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
        listaDiv.innerHTML = '';
        if(dados[cat].length === 0) {
            listaDiv.innerHTML = '<p style="text-align:center; color:#666">Vazio</p>';
            return;
        }
        dados[cat].forEach(item => {
            const div = document.createElement('div');
            div.className = 'canal-item';
            div.innerText = item.nome;
            div.onclick = () => play(item.link, item.nome);
            listaDiv.appendChild(div);
        });
    }

    function play(url, nome) {
        if (hls) hls.destroy();
        if (url.includes('m3u8') && Hls.isSupported()) {
            hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else {
            video.src = url;
            video.play();
        }
        fecharGaveta();
    }

    function carregarLocal(e) {
        const file = e.target.files[0];
        if (file) {
            if (hls) hls.destroy();
            video.src = URL.createObjectURL(file);
            video.play();
        }
    }

    window.onload = () => {
        const urlParams = new URLSearchParams(window.location.search);
        const listaUrl = urlParams.get('lista');
        if (listaUrl) carregarM3U(decodeURIComponent(listaUrl));
        resetTimer();
    };
</script>
</body>
</html>
