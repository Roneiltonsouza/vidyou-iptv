<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VidYou IPTV PRO - High Performance</title>
    
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>
    
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* SUA INTERFACE ORIGINAL */
        header { 
            padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; 
            background: linear-gradient(90deg, #4b0082, #ff4500); 
            border-bottom: 2px solid #ff4500; z-index: 100;
        }
        .btn-header { background: #000; border: 1px solid #ff4500; color: #ff4500; padding: 8px 12px; font-weight: bold; border-radius: 4px; cursor: pointer; }
        
        #player-wrapper { position: relative; width: 100%; flex: 1; background: #000; }

        /* Customização do Player Profissional para ocupar a tela toda */
        .video-js { width: 100% !important; height: 100% !important; }
        .vjs-big-play-button { display: none !important; } /* Toca direto */

        .cast-display-btn {
            position: absolute; top: 20px; right: 20px; z-index: 9999;
            background: rgba(0, 0, 0, 0.6); border: 1px solid #fff;
            border-radius: 50%; width: 50px; height: 50px;
            display: flex; align-items: center; justify-content: center;
        }
        google-cast-launcher { width: 30px; height: 30px; --disconnected-color: #ffffff; }

        .seta-canais {
            position: absolute; top: 20px; left: 20px; z-index: 9999;
            background: rgba(255, 69, 0, 0.9); color: #fff; border: 2px solid #fff;
            width: 55px; height: 55px; border-radius: 50%; cursor: pointer; font-size: 22px;
            display: flex; align-items: center; justify-content: center;
        }

        /* GAVETA ORIGINAL */
        #gaveta {
            position: absolute; top: 0; left: -310px; width: 300px; height: 100%;
            background: rgba(10, 10, 10, 0.98); z-index: 10000; transition: 0.4s;
            border-right: 3px solid #ff4500; display: flex; flex-direction: column;
        }
        #gaveta.ativa { left: 0; }
        .search-container { padding: 10px; background: #1a1a1a; }
        #search-input { width: 100%; padding: 10px; border-radius: 4px; border: 1px solid #ff4500; background: #000; color: #fff; outline: none; }
        #itens-canais { flex: 1; overflow-y: auto; }
        .canal-item { padding: 12px; border-bottom: 1px solid #222; cursor: pointer; display: flex; align-items: center; gap: 12px; }
        .canal-item:hover { background: #ff4500; color: #000; font-weight: bold; }
        .canal-logo { width: 45px; height: 45px; border-radius: 4px; object-fit: contain; background: #fff; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: 900; color: #fff; font-size: 1.4rem;">VidYou <span style="color:#000">IPTV</span></div>
    <button class="btn-header" onclick="toggleFS()">⛶ FULLSCREEN</button>
</header>

<div id="player-wrapper">
    <video id="my-player" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto" playsinline></video>
    
    <button class="seta-canais" onclick="abrirGaveta()">▼</button>
    
    <div class="cast-display-btn"><google-cast-launcher></google-cast-launcher></div>
    
    <div id="gaveta">
        <div style="padding:15px; background:#ff4500; color:#000; font-weight:bold; cursor:pointer; text-align:center;" onclick="fecharGaveta()">FECHAR MENU X</div>
        <div class="search-container"><input type="text" id="search-input" placeholder="🔍 Buscar canal..." onkeyup="filtrarGeral()"></div>
        <div id="itens-canais"></div>
    </div>
</div>

<script>
    const URL_GITHUB = "https://raw.githubusercontent.com/roneiltonsouza/vidyou-iptv/main/lista.txt";
    let player = videojs('my-player', {
        html5: {
            vjsHls: { 
                overrideNative: true,
                bandwidth: 500000, // Otimizado para internet fraca
                enableLowInitialPlaylist: true 
            }
        }
    });

    // CONFIG CAST
    window.__onGCastApiAvailable = function(isAvailable) {
        if (isAvailable) {
            cast.framework.CastContext.getInstance().setOptions({
                receiverApplicationId: chrome.cast.media.DEFAULT_MEDIA_RECEIVER_APP_ID,
                autoJoinPolicy: chrome.cast.AutoJoinPolicy.ORIGIN_SCOPED
            });
        }
    };

    function tocarDireto(url, nome) {
        // Enviar para Cast se estiver conectado
        const castSession = cast.framework.CastContext.getInstance().getCurrentSession();
        if (castSession) {
            const mediaInfo = new chrome.cast.media.MediaInfo(url, 'application/x-mpegurl');
            const metadata = new chrome.cast.media.GenericMediaMetadata();
            metadata.title = nome;
            mediaInfo.metadata = metadata;
            castSession.loadMedia(new chrome.cast.media.LoadRequest(mediaInfo));
        }

        // Troca de fonte profissional (sem delay)
        player.src({ type: 'application/x-mpegURL', src: url });
        player.play();
        fecharGaveta();
    }

    async function buscarLista() {
        try {
            const res = await fetch(URL_GITHUB + "?t=" + Date.now());
            const link = (await res.text()).trim();
            const resM3U = await fetch(link);
            const text = await resM3U.text();
            
            const lines = text.split('\n');
            let canais = [];
            for (let i = 0; i < lines.length; i++) {
                if (lines[i].includes('#EXTINF')) {
                    const nome = lines[i].split(',')[1] || "Canal";
                    const logo = lines[i].match(/tvg-logo="([^"]+)"/)?.[1] || "";
                    const url = lines[i+1]?.trim();
                    if (url && url.startsWith('http')) canais.push({ nome, logo, url });
                }
            }
            renderizar(canais);
        } catch (e) { console.log("Erro ao carregar lista."); }
    }

    function renderizar(canais) {
        document.getElementById('itens-canais').innerHTML = canais.map(c => `
            <div class="canal-item" onclick="tocarDireto('${c.url}', '${c.nome}')">
                <img src="${c.logo}" class="canal-logo" onerror="this.src='https://via.placeholder.com/45'">
                <span>${c.nome}</span>
            </div>
        `).join('');
    }

    function abrirGaveta() { document.getElementById('gaveta').classList.add('ativa'); }
    function fecharGaveta() { document.getElementById('gaveta').classList.remove('ativa'); }
    function toggleFS() { if (!player.isFullscreen()) player.requestFullscreen(); else player.exitFullscreen(); }

    window.onload = buscarLista;
</script>
</body>
</html>
