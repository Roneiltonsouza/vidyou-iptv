<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>VidYou IPTV PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; height: 100vh; overflow: hidden; }
        #player-fullscreen-wrapper { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; }
        #gaveta { position: absolute; top: 0; left: -300px; width: 280px; height: 100%; background: #111; z-index: 100; transition: 0.4s; }
        #gaveta.ativa { left: 0; }
        .canal-item { padding: 10px; border-bottom: 1px solid #333; cursor: pointer; }
    </style>
</head>
<body>
<div id="player-fullscreen-wrapper">
    <video id="vid" controls playsinline></video>
    <div id="gaveta">
        <div style="padding:15px; background:#ff4500; text-align:center; cursor:pointer" onclick="document.getElementById('gaveta').classList.remove('ativa')">FECHAR</div>
        <div id="itens-canais"></div>
    </div>
</div>
<script>
    const video = document.getElementById('vid');
    let hls = new Hls();
    function limparTudo() {
        document.getElementById('itens-canais').innerHTML = '<p>Lista removida.</p>';
        if (hls) hls.destroy();
        video.src = "";
    }
    async function importar(url) {
        const res = await fetch(url);
        const text = await res.text();
        const lines = text.split('\n');
        let html = '';
        lines.forEach((l, i) => {
            if (l.includes('#EXTINF')) {
                const nome = l.split(',')[1];
                const link = lines[i+1]?.trim();
                html += `<div class="canal-item" onclick="tocar('${link}')">${nome}</div>`;
            }
        });
        document.getElementById('itens-canais').innerHTML = html;
        document.getElementById('gaveta').classList.add('ativa');
    }
    function tocar(url) {
        if (hls) hls.destroy();
        hls = new Hls(); hls.loadSource(url); hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
    }
    window.onload = () => {
        const p = new URLSearchParams(window.location.search);
        if (p.get('comando') === 'limpar') limparTudo();
        else if (p.get('lista')) importar(decodeURIComponent(p.get('lista')));
    };
</script>
</body>
</html>
