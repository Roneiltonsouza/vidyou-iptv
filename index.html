<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VidYou IPTV PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; background: linear-gradient(90deg, #4b0082, #ff4500); border-bottom: 2px solid #ff4500; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .header-buttons { display: flex; gap: 10px; }
        .btn-header { background: #000; border: 1px solid #ff4500; color: #ff4500; padding: 10px 15px; font-weight: bold; border-radius: 5px; cursor: pointer; }
        
        #player-content { position: relative; width: 100%; flex: 1; display: flex; align-items: center; justify-content: center; background: #000; }
        video { width: 100%; height: 100%; }

        .seta-canais { 
            position: absolute; top: 25px; left: 25px; z-index: 999; 
            background: rgba(0,0,0,0.8); color: #ff4500; border: 2px solid #ff4500; 
            width: 55px; height: 55px; border-radius: 50%; display: flex; 
            align-items: center; justify-content: center; cursor: pointer; font-size: 24px;
        }

        #gaveta { 
            position: absolute; top: 0; left: -320px; width: 300px; height: 100%; 
            background: rgba(15,15,15,0.98); z-index: 1000; transition: 0.4s ease-in-out; 
            border-right: 4px solid #ff4500; overflow-y: auto; 
        }
        #gaveta.ativa { left: 0; }
        .canal-item { padding: 18px; border-bottom: 1px solid #222; cursor: pointer; font-size: 1.1rem; transition: 0.2s; }
        .canal-item:active { background: #ff4500; color: #000; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: bold; font-size: 1.3rem; letter-spacing: 1px;">VIDYOU IPTV</div>
    <div class="header-buttons">
        <button class="btn-header" onclick="document.getElementById('file-input').click()">📁 ABRIR</button>
        <button class="btn-header" onclick="toggleFS()">⛶ TELA CHEIA</button>
    </div>
    <input type="file" id="file-input" style="display:none" onchange="carregarLocal(event)">
</header>

<div id="player-content">
    <video id="vid" controls playsinline></video>
    <div class="seta-canais" onclick="abrirGaveta()">▼</div>
    
    <div id="gaveta">
        <div style="padding:20px; background:#ff4500; color:#000; font-weight:bold; text-align:center; cursor:pointer; font-size:1.2rem;" 
             onclick="fecharGaveta()">FECHAR LISTA</div>
        <div id="itens-canais"></div>
    </div>
</div>

<script>
    const video = document.getElementById('vid');
    let hls = new Hls();

    function toggleFS() {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
    }

    function abrirGaveta() { document.getElementById('gaveta').classList.add('ativa'); }
    function fecharGaveta() { document.getElementById('gaveta').classList.remove('ativa'); }

    // Função para arquivos locais
    function carregarLocal(e) {
        const file = e.target.files[0];
        if (file) {
            video.src = URL.createObjectURL(file);
            video.play();
            localStorage.removeItem('vidyou_cached_url'); // Limpa o cache pra não conflitar
        }
    }

    async function carregarM3U(url) {
        if(!url) return;
        try {
            const res = await fetch(url);
            const data = await res.text();
            localStorage.setItem('vidyou_cached_url', url); 
            processarLista(data);
        } catch(e) { 
            alert("Erro ao conectar com o servidor da lista."); 
        }
    }

    function processarLista(text) {
        const lines = text.split('\n');
        let html = '';
        lines.forEach((line, i) => {
            if (line.includes('#EXTINF')) {
                const nome = line.split(',')[1] || "Canal Sem Nome";
                const link = lines[i+1]?.trim();
                if(link && link.startsWith('http')) {
                    html += `<div class="canal-item" onclick="tocar('${link}')">${nome}</div>`;
                }
            }
        });
        document.getElementById('itens-canais').innerHTML = html || '<p style="padding:20px">Nenhum canal na lista.</p>';
        abrirGaveta();
    }

    function tocar(url) {
        if (hls) hls.destroy();
        if (url.includes('.m3u8')) {
            hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else {
            video.src = url;
            video.play();
        }
        fecharGaveta();
    }

    window.onload = () => {
        const urlParams = new URLSearchParams(window.location.search);
        const listaNova = urlParams.get('lista');
        const listaAntiga = localStorage.getItem('vidyou_cached_url');

        if (listaNova) {
            carregarM3U(decodeURIComponent(listaNova));
        } else if (listaAntiga) {
            carregarM3U(listaAntiga);
        }
    };
</script>
</body>
</html>
