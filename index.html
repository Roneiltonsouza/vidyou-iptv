<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VidYou IPTV PRO - V2</title>
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>

    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { 
            padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; 
            background: linear-gradient(90deg, #4b0082, #ff4500); 
            border-bottom: 2px solid #ff4500; z-index: 100;
        }

        .controls-right { display: flex; gap: 10px; align-items: center; }

        .btn-header { 
            background: #000; border: 1px solid #ff4500; color: #ff4500; 
            padding: 8px 12px; font-weight: bold; border-radius: 4px; cursor: pointer; 
            display: flex; align-items: center; justify-content: center;
        }

        /* Estilo do Botão Cast no Header */
        google-cast-launcher {
            width: 24px;
            height: 24px;
            cursor: pointer;
            --connected-color: #00ff00;
            --disconnected-color: #ffffff;
        }

        #player-wrapper { position: relative; width: 100%; flex: 1; background: #000; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: contain; background: #000; }

        /* Status de Transmissão sobre o vídeo */
        #cast-indicator {
            position: absolute; top: 10px; right: 10px; padding: 5px 10px;
            background: rgba(0,0,0,0.6); border-radius: 5px; font-size: 10px;
            color: #00ff00; display: none; border: 1px solid #00ff00;
        }

        .seta-canais {
            position: absolute; top: 20px; left: 20px; z-index: 200;
            background: rgba(0, 0, 0, 0.7); color: #ff4500; border: 2px solid #ff4500;
            width: 50px; height: 50px; border-radius: 50%; cursor: pointer; font-size: 20px;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.5s ease; opacity: 1;
        }
        .seta-canais.invisivel { opacity: 0; pointer-events: none; }

        #gaveta {
            position: absolute; top: 0; left: -310px; width: 300px; height: 100%;
            background: rgba(10, 10, 10, 0.98); z-index: 2147483647; transition: 0.4s;
            border-right: 3px solid #ff4500; overflow-y: hidden; display: flex; flex-direction: column;
        }
        #gaveta.ativa { left: 0; }
        
        .search-container { padding: 10px; background: #1a1a1a; }
        #search-input { 
            width: 100%; padding: 10px; border-radius: 4px; border: 1px solid #ff4500; 
            background: #000; color: #fff; box-sizing: border-box; outline: none;
        }
        
        .tabs-container { display: flex; gap: 5px; padding: 10px; border-bottom: 1px solid #333; }
        .tab-btn { 
            flex: 1; padding: 8px 2px; font-size: 0.7rem; font-weight: bold; 
            background: #222; border: 1px solid #444; color: #aaa; border-radius: 4px; cursor: pointer;
        }
        .tab-btn.active { background: #ff4500; color: #000; border-color: #fff; }

        #itens-canais { flex: 1; overflow-y: auto; }
        .canal-item { padding: 12px; border-bottom: 1px solid #222; cursor: pointer; display: flex; align-items: center; gap: 12px; }
        .canal-item:hover { background: #ff4500; color: #000; }
        .canal-logo { width: 40px; height: 40px; border-radius: 4px; object-fit: contain; background: #fff; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: 900; color: #fff; font-size: 1.4rem;">VidYou <span style="color:#000">IPTV</span></div>
    <div class="controls-right">
        <div class="btn-header" title="Transmitir para TV">
            <google-cast-launcher></google-cast-launcher>
        </div>
        <button class="btn-header" onclick="toggleFS()">⛶ TELA</button>
        <button class="btn-header" onclick="document.getElementById('file-input').click()">📁 ABRIR</button>
    </div>
    <input type="file" id="file-input" style="display:none" onchange="carregarLocal(event)">
</header>

<div id="player-wrapper">
    <video id="vid" controls playsinline></video>
    <div id="cast-indicator">📺 TRANSMITINDO PARA TV</div>
    <button class="seta-canais" id="botaoSeta" onclick="abrirGaveta()">▼</button>
    
    <div id="gaveta">
        <div style="padding:15px; background:#ff4500; color:#000; font-weight:bold; cursor:pointer; text-align:center;" onclick="fecharGaveta()">FECHAR MENU X</div>
        <div class="search-container"><input type="text" id="search-input" placeholder="🔍 Buscar..." onkeyup="filtrarGeral()"></div>
        <div class="tabs-container">
            <button class="tab-btn active" id="btn-tv" onclick="setTab('tv')">📺 TV</button>
            <button class="tab-btn" id="btn-filmes" onclick="setTab('filmes')">🎬 Filmes</button>
            <button class="tab-btn" id="btn-series" onclick="setTab('series')">🍿 Séries</button>
        </div>
        <div id="itens-canais"></div>
    </div>
</div>

<script>
    const URL_GITHUB = "https://raw.githubusercontent.com/roneiltonsouza/vidyou-iptv/main/lista.txt";
    const video = document.getElementById('vid');
    const wrapper = document.getElementById('player-wrapper');
    const seta = document.getElementById('botaoSeta');
    const castInd = document.getElementById('cast-indicator');
    
    let hls = null;
    let listaCanais = [];
    let abaAtual = 'tv';
    let currentUrl = "";
    let currentTitle = "VidYou IPTV";

    // --- MOTOR GOOGLE CAST ---
    window.__onGCastApiAvailable = function(isAvailable) {
        if (isAvailable) { initializeCastApi(); }
    };

    function initializeCastApi() {
        const context = cast.framework.CastContext.getInstance();
        context.setOptions({
            receiverApplicationId: chrome.cast.media.DEFAULT_MEDIA_RECEIVER_APP_ID,
            autoJoinPolicy: chrome.cast.AutoJoinPolicy.ORIGIN_SCOPED
        });

        context.addEventListener(cast.framework.CastContextEventType.SESSION_STATE_CHANGED, (event) => {
            switch (event.sessionState) {
                case 'SESSION_STARTED':
                    castInd.style.display = 'block';
                    if (currentUrl) enviarParaTV(currentUrl, currentTitle);
                    break;
                case 'SESSION_ENDED':
                    castInd.style.display = 'none';
                    break;
            }
        });
    }

    function enviarParaTV(url, title) {
        const session = cast.framework.CastContext.getInstance().getCurrentSession();
        if (session) {
            const mediaInfo = new chrome.cast.media.MediaInfo(url, 'application/x-mpegurl');
            const metadata = new chrome.cast.media.GenericMediaMetadata();
            metadata.title = title;
            metadata.subtitle = "VidYou IPTV Pro";
            mediaInfo.metadata = metadata;

            const request = new chrome.cast.media.LoadRequest(mediaInfo);
            session.loadMedia(request).then(() => video.pause());
        }
    }

    // --- FUNÇÕES DO PLAYER ---
    function configurarPlayer(url, title) {
        currentUrl = url;
        currentTitle = title || "Canal";
        
        // Se estiver conectado no Cast, envia para TV
        const session = cast.framework.CastContext.getInstance().getCurrentSession();
        if (session) {
            enviarParaTV(url, currentTitle);
            return;
        }

        if (hls) hls.destroy();

        if (url.includes('.m3u8') && Hls.isSupported()) {
            hls = new Hls({ maxBufferLength: 30 });
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else {
            video.src = url;
            video.play();
        }
    }

    // --- LÓGICA DE LISTA E UI ---
    async function buscarLista() {
        try {
            const resLink = await fetch(URL_GITHUB + "?t=" + Date.now());
            const linkReal = (await resLink.text()).trim();
            if (linkReal.startsWith("http")) {
                const resM3U = await fetch(linkReal);
                const text = await resM3U.text();
                parseM3U(text);
            }
        } catch (e) { console.log("Erro ao carregar lista."); }
    }

    function parseM3U(text) {
        const lines = text.split('\n');
        listaCanais = [];
        for (let i = 0; i < lines.length; i++) {
            if (lines[i].includes('#EXTINF')) {
                const nome = lines[i].split(',')[1] || "Sem Nome";
                const logo = lines[i].match(/tvg-logo="([^"]+)"/)?.[1] || '';
                const grupo = lines[i].match(/group-title="([^"]+)"/)?.[1] || "";
                const link = lines[i+1]?.trim();
                if (link?.startsWith('http')) {
                    let tipo = 'tv';
                    const low = (nome + grupo).toLowerCase();
                    if (low.includes('filmes')) tipo = 'filmes';
                    else if (low.includes('série')) tipo = 'series';
                    listaCanais.push({ nome, logo, link, tipo });
                }
            }
        }
        filtrarGeral();
    }

    function filtrarGeral() {
        const termo = document.getElementById('search-input').value.toLowerCase();
        const filtrados = listaCanais.filter(c => c.tipo === abaAtual && c.nome.toLowerCase().includes(termo));
        const container = document.getElementById('itens-canais');
        container.innerHTML = filtrados.map(c => `
            <div class="canal-item" onclick="tocarDireto('${c.link}', '${c.nome.replace(/'/g, "")}')">
                <img src="${c.logo}" class="canal-logo" onerror="this.src='https://via.placeholder.com/40'">
                <span>${c.nome}</span>
            </div>
        `).join('');
    }

    function setTab(tab) {
        abaAtual = tab;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.id === 'btn-'+tab));
        filtrarGeral();
    }

    function tocarDireto(url, title) { configurarPlayer(url, title); fecharGaveta(); }
    function toggleFS() { if (!document.fullscreenElement) wrapper.requestFullscreen(); else document.exitFullscreen(); }
    function abrirGaveta() { document.getElementById('gaveta').classList.add('ativa'); }
    function fecharGaveta() { document.getElementById('gaveta').classList.remove('ativa'); }
    function carregarLocal(e) { if (e.target.files[0]) { video.src = URL.createObjectURL(e.target.files[0]); video.play(); } }

    window.onload = () => { buscarLista(); setInterval(buscarLista, 60000); };
</script>
</body>
</html>
