<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VidYou IPTV PRO - Modern Player</title>
    
    <script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <style>
        :root { --primary: #ff4500; --bg: #050505; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; height: 100vh; overflow: hidden; }
        
        /* Player estilo Imersivo */
        #player-wrapper { 
            position: relative; width: 100%; height: 100vh; background: #000; 
            display: flex; align-items: center; justify-content: center;
        }

        video { width: 100%; height: 100%; object-fit: contain; }

        /* Overlay de Controles Modernos */
        .controls-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.4);
            display: flex; flex-direction: column; justify-content: space-between;
            opacity: 0; transition: opacity 0.4s; z-index: 10;
        }
        #player-wrapper:hover .controls-overlay, .controls-overlay.active { opacity: 1; }

        .top-bar { padding: 20px; display: flex; justify-content: space-between; align-items: center; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); }
        .bottom-bar { padding: 20px; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); }

        /* Botões Estilo App */
        .btn-action { 
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); 
            color: #fff; padding: 10px 18px; border-radius: 50px; cursor: pointer;
            backdrop-filter: blur(10px); font-weight: 600; display: flex; align-items: center; gap: 8px;
            transition: 0.3s;
        }
        .btn-action:hover { background: var(--primary); border-color: #fff; }

        /* Botão Cast e Menu */
        .cast-btn { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: var(--primary); box-shadow: 0 4px 15px rgba(255,69,0,0.4); }
        google-cast-launcher { width: 25px; height: 25px; }

        /* Gaveta de Canais Lateral */
        #gaveta {
            position: absolute; top: 0; left: -320px; width: 310px; height: 100%;
            background: rgba(10,10,10,0.95); backdrop-filter: blur(20px);
            z-index: 1000; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            border-right: 1px solid rgba(255,69,0,0.3); display: flex; flex-direction: column;
        }
        #gaveta.active { left: 0; }

        .search-box { padding: 20px; }
        #search-input { 
            width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #333; 
            background: rgba(255,255,255,0.05); color: #fff; outline: none;
        }
        #search-input:focus { border-color: var(--primary); }

        .channel-list { flex: 1; overflow-y: auto; padding: 10px; }
        .channel-card { 
            display: flex; align-items: center; gap: 15px; padding: 12px; 
            border-radius: 12px; cursor: pointer; transition: 0.2s; margin-bottom: 5px;
        }
        .channel-card:hover { background: rgba(255,69,0,0.2); transform: translateX(5px); }
        .channel-card img { width: 50px; height: 50px; border-radius: 8px; object-fit: contain; background: #fff; }

        /* Loading Spinner */
        #loader { 
            position: absolute; width: 60px; height: 60px; border: 5px solid rgba(255,255,255,0.1);
            border-top: 5px solid var(--primary); border-radius: 50%;
            animation: spin 1s linear infinite; display: none; z-index: 5;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="player-wrapper">
    <div id="loader"></div>
    <video id="vid" playsinline crossorigin="anonymous"></video>

    <div class="controls-overlay" id="overlay">
        <div class="top-bar">
            <button class="btn-action" onclick="toggleGaveta()">☰ CANAIS</button>
            <div style="display: flex; gap: 10px;">
                <div class="cast-btn"><google-cast-launcher></google-cast-launcher></div>
                <button class="btn-action" onclick="toggleFS()">⛶</button>
            </div>
        </div>

        <div style="display: flex; justify-content: center; gap: 30px;">
            </div>

        <div class="bottom-bar">
            <div id="channel-title" style="font-size: 1.2rem; font-weight: bold; margin-bottom: 10px;">VidYou IPTV PRO</div>
            <div style="display: flex; align-items: center; gap: 15px;">
                <button class="btn-action" onclick="document.getElementById('vid').play()">▶ Play</button>
                <button class="btn-action" onclick="document.getElementById('vid').pause()">⏸ Pause</button>
                <button class="btn-action" onclick="document.getElementById('file-input').click()">📁 Abrir M3U</button>
            </div>
        </div>
    </div>

    <div id="gaveta">
        <div class="search-box">
            <h2 style="color: var(--primary); margin-top: 0;">VidYou Menu</h2>
            <input type="text" id="search-input" placeholder="Procurar canal, filme..." onkeyup="filtrar()">
        </div>
        <div class="channel-list" id="lista"></div>
        <button class="btn-action" style="margin: 20px;" onclick="toggleGaveta()">FECHAR</button>
    </div>
</div>

<input type="file" id="file-input" style="display:none" onchange="carregarLocal(event)">

<script>
    const URL_GITHUB = "https://raw.githubusercontent.com/roneiltonsouza/vidyou-iptv/main/lista.txt";
    const video = document.getElementById('vid');
    const loader = document.getElementById('loader');
    const overlay = document.getElementById('overlay');
    let hls = null;
    let listaCanais = [];
    let uiTimer;

    // Configuração do Cast (Web Video Caster Style)
    window.__onGCastApiAvailable = function(isAvailable) {
        if (isAvailable) {
            cast.framework.CastContext.getInstance().setOptions({
                receiverApplicationId: chrome.cast.media.DEFAULT_MEDIA_RECEIVER_APP_ID,
                autoJoinPolicy: chrome.cast.AutoJoinPolicy.ORIGIN_SCOPED
            });
        }
    };

    function showLoader(show) { loader.style.display = show ? 'block' : 'none'; }

    function configurarPlayer(url, titulo) {
        document.getElementById('channel-title').innerText = titulo;
        showLoader(true);

        // Enviar para Cast se ativo
        const castSession = cast.framework.CastContext.getInstance().getCurrentSession();
        if (castSession) {
            const mediaInfo = new chrome.cast.media.MediaInfo(url, 'application/x-mpegurl');
            const metadata = new chrome.cast.media.GenericMediaMetadata();
            metadata.title = titulo;
            mediaInfo.metadata = metadata;
            castSession.loadMedia(new chrome.cast.media.LoadRequest(mediaInfo));
        }

        if (hls) hls.destroy();

        if (Hls.isSupported()) {
            hls = new Hls({
                maxBufferLength: 30,
                maxMaxBufferLength: 60,
                startLevel: -1,
                abandonNextLevelRetry: 5,
                enableWorker: true,
                liveSyncDurationCount: 3,
                lowLatencyMode: true
            });
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                video.play();
                showLoader(false);
            });
            
            // Auto-reconexão agressiva (Web Video Caster logic)
            hls.on(Hls.Events.ERROR, (event, data) => {
                if (data.fatal) {
                    showLoader(true);
                    if (data.type === Hls.ErrorTypes.NETWORK_ERROR) hls.startLoad();
                    else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) hls.recoverMediaError();
                    else configurarPlayer(url, titulo);
                }
            });
        } else {
            video.src = url;
            video.addEventListener('loadedmetadata', () => {
                video.play();
                showLoader(false);
            });
        }
    }

    // Carregamento de lista
    async function init() {
        try {
            const res = await fetch(URL_GITHUB);
            const link = (await res.text()).trim();
            const m3u = await fetch(link);
            const text = await m3u.text();
            parseM3U(text);
        } catch(e) { console.error("Falha ao iniciar lista"); }
    }

    function parseM3U(text) {
        const lines = text.split('\n');
        listaCanais = [];
        for (let i = 0; i < lines.length; i++) {
            if (lines[i].includes('#EXTINF')) {
                const nome = lines[i].split(',')[1] || "Canal";
                const logo = lines[i].match(/tvg-logo="([^"]+)"/)?.[1] || "";
                const link = lines[i+1]?.trim();
                if(link && link.startsWith('http')) listaCanais.push({nome, logo, link});
            }
        }
        render(listaCanais);
    }

    function render(canais) {
        const div = document.getElementById('lista');
        div.innerHTML = canais.map(c => `
            <div class="channel-card" onclick="playCanal('${c.link}', '${c.nome}')">
                <img src="${c.logo}" onerror="this.src='https://via.placeholder.com/50'">
                <span>${c.nome}</span>
            </div>
        `).join('');
    }

    function playCanal(l, n) {
        configurarPlayer(l, n);
        toggleGaveta();
    }

    function filtrar() {
        const t = document.getElementById('search-input').value.toLowerCase();
        render(listaCanais.filter(c => c.nome.toLowerCase().includes(t)));
    }

    function toggleGaveta() { document.getElementById('gaveta').classList.toggle('active'); }
    
    function toggleFS() {
        if (!document.fullscreenElement) document.getElementById('player-wrapper').requestFullscreen();
        else document.exitFullscreen();
    }

    // Controle de UI
    function activeUI() {
        overlay.classList.add('active');
        clearTimeout(uiTimer);
        uiTimer = setTimeout(() => overlay.classList.remove('active'), 4000);
    }

    document.getElementById('player-wrapper').addEventListener('mousemove', activeUI);
    document.getElementById('player-wrapper').addEventListener('touchstart', activeUI);

    window.onload = init;
</script>
</body>
</html>
