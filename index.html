<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VidYou IPTV - Player</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.10/hls.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 15px; background: #0a0a0a; border-bottom: 2px solid #ff4500; text-align: center; color: #ff4500; font-weight: bold; }
        .player-container { width: 100%; aspect-ratio: 16/9; background: #050505; }
        video { width: 100%; height: 100%; }
        .status { padding: 10px; font-size: 0.8rem; background: #111; color: #888; text-align: center; }
        .content { flex: 1; overflow-y: auto; padding: 10px; }
        .item { background: #1a1a1a; padding: 10px; margin: 5px 0; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <header>VIDYOU IPTV</header>
    <div class="player-container">
        <video id="video" controls playsinline></video>
    </div>
    <div class="status" id="status">AGUARDANDO LISTA...</div>
    <div class="content" id="lista"></div>

<script>
    const video = document.getElementById('video');
    const status = document.getElementById('status');
    const listaContainer = document.getElementById('lista');

    async function carregarLista(url) {
        try {
            status.innerText = "SINCRONIZANDO...";
            // O segredo está aqui: o proxy ajuda a evitar o erro de CORS
            const proxy = "https://corsproxy.io/?";
            const response = await fetch(proxy + encodeURIComponent(url));
            const text = await response.text();
            
            const lines = text.split('\n');
            listaContainer.innerHTML = '';
            
            for (let i = 0; i < lines.length; i++) {
                if (lines[i].startsWith('#EXTINF')) {
                    const nome = lines[i].split(',')[1] || "Canal";
                    const stream = lines[i+1]?.trim();
                    if (stream) {
                        const div = document.createElement('div');
                        div.className = 'item';
                        div.innerText = nome;
                        div.onclick = () => darPlay(stream, nome);
                        listaContainer.appendChild(div);
                    }
                }
            }
            status.innerText = "LISTA CARREGADA!";
        } catch (e) {
            status.innerText = "ERRO DE CONEXÃO (CORS/URL)";
        }
    }

    function darPlay(url, nome) {
        status.innerText = "REPRODUZINDO: " + nome;
        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else {
            video.src = url;
            video.play();
        }
    }

    window.onload = () => {
        const params = new URLSearchParams(window.location.search);
        const urlLista = params.get('lista');
        if (urlLista) carregarLista(decodeURIComponent(urlLista));
    };
</script>
</body>
</html>
