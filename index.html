<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VidYou IPTV PRO - V2 Premium</title>
    
    <script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { 
            padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; 
            background: linear-gradient(90deg, #1a1a1a, #4b0082); 
            border-bottom: 2px solid #ff4500; z-index: 100;
        }

        .btn-header { background: #000; border: 1px solid #ff4500; color: #ff4500; padding: 6px 10px; font-weight: bold; border-radius: 4px; cursor: pointer; }
        
        #player-wrapper { position: relative; width: 100%; flex: 1; background: #000; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: contain; }

        /* --- CONTROLES DENTRO DO DISPLAY --- */
        #controles-ui {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 1000; transition: opacity 0.5s ease; opacity: 1;
        }
        #controles-ui.invisivel { opacity: 0; }

        /* SISTEMA CAST PROFISSIONAL NO CANTO DO DISPLAY */
        .cast-container {
            position: absolute; top: 20px; right: 20px; pointer-events: auto;
            text-align: center; background: rgba(0,0,0,0.4); padding: 8px; border-radius: 12px;
        }

        google-cast-launcher {
            width: 45px; height: 45px; cursor: pointer;
            --connected-color: #00ff00; /* LED VERDE DO RONEILTON */
            --disconnected-color: #ffffff;
            filter: drop-shadow(0 0 10px #000);
        }

        #cast-status {
            display: block; margin-top: 5px; font-size: 10px; font-weight: bold;
            letter-spacing: 1px; text-transform: uppercase; transition: 0.5s;
        }

        /* SETA DE CANAIS NO DISPLAY */
        .seta-canais {
            position: absolute; top: 20px; left: 20px; pointer-events: auto;
            background: rgba(0, 0, 0, 0.7); color: #ff4500; border: 2px solid #ff4500;
            width: 50px; height: 50px; border-radius: 50%; cursor: pointer; font-size: 20px;
            display: flex; align-items: center; justify-content: center;
        }

        /* --- GAVETA --- */
        #gaveta {
            position: absolute; top: 0; left: -310px; width: 300px; height: 100%;
            background: rgba(10, 10, 10, 0.98); z-index: 2147483647; transition: 0.4s;
            border-right: 3px solid #ff4500; display: flex; flex-direction: column;
        }
        #gaveta.ativa { left: 0; }
        #itens-canais { flex: 1; overflow-y: auto; }
        .canal-item { padding: 12px; border-bottom: 1px solid #222; cursor: pointer; display: flex; align-items: center; gap: 12px; }
        .canal-logo { width: 45px; height: 45px; border-radius: 5px; object-fit: contain; background: #fff; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: 900; color: #fff; font-size: 1.3rem;">VidYou <span style="color:#ff4500">PRO</span></div>
    <div style="display:flex; gap:10px;">
        <button class="btn-header" onclick="toggleFS()">⛶ TELA</button>
        <button class="btn-header" onclick="document.getElementById('file-input').click()">📁 ABRIR</button>
    </div>
    <input type="file" id="file-input" style="display:none" onchange="carregarLocal(event)">
</header>

<div id="player-wrapper">
    <video id="vid" controls playsinline></video>
    
    <div id="controles-ui">
        <button class="seta-canais" onclick="abrirGaveta()">▼</button>

        <div class="cast-container">
            <google-cast-launcher title="Transmitir para TV"></google-cast-launcher>
            <span id="cast-status">OFFLINE</span>
        </div>
    </div>
    
    <div id="gaveta">
        <div style="padding:15px; background:#ff4500; color:#000; font-weight:bold; cursor:pointer; text-align:center;" onclick="fecharGaveta()">FECHAR MENU X</div>
        <div style="padding:10px;"><input type="text" id="search-input" placeholder="🔍 Buscar canal..." onkeyup="filtrarGeral()" style="width:100%; padding:10px; background:#000; color:#fff; border:1px solid #ff4500;"></div>
        <div id="itens-canais"></div>
    </div>
</div>

<script>
    const video = document.getElementById('vid');
    const wrapper = document.getElementById('player-wrapper');
    const controlesUI = document.getElementById('controles-ui');
    let hls = null, listaCanais = [], timerUI;

    // --- LOGICA DO MOTOR GOOGLE CAST SDK (RECUPERADA) ---
    window.__onGCastApiAvailable = function(isAvailable) {
        if (isAvailable) { initializeCastApi(); }
    };

    function initializeCastApi() {
        const context = cast.framework.CastContext.getInstance();
        context.setOptions({
            receiverApplicationId: chrome.cast.media.DEFAULT_MEDIA_RECEIVER_APP_ID,
            autoJoinPolicy: chrome.cast.AutoJoinPolicy.ORIGIN_SCOPED
        });

        context.addEventListener(cast.framework.CastContextEventType.SESSION_STATE_CHANGED, (event) => {
            const status = document.getElementById('cast-status');
            if (status) {
                if (event.sessionState === 'SESSION_STARTED') {
                    status.innerText = "📺 CONECTADO";
                    status.style.color = "#00ff00"; // LED VERDE ORIGINAL
                } else if (event.sessionState === 'SESSION_ENDED') {
                    status.innerText = "OFFLINE";
                    status.style.color = "#ffffff";
                }
            }
        });
    }

    function enviarParaTV(url, title) {
        const castSession = cast.framework.CastContext.getInstance().getCurrentSession();
        if (castSession) {
            const mediaInfo = new chrome.cast.media.MediaInfo(url, 'application/x-mpegurl');
            const metadata = new chrome.cast.media.GenericMediaMetadata();
            metadata.title = title;
            metadata.subtitle = "Transmitindo via VidYou PRO";
            mediaInfo.metadata = metadata;

            const request = new chrome.cast.media.LoadRequest(mediaInfo);
            castSession.loadMedia(request).then(
                () => console.log('✅ Sucesso na TV!'),
                (err) => console.error('❌ Erro no Cast:', err)
            );
        }
    }

    // --- FUNÇÕES DE PLAYER E INTERFACE ---
    function configurarPlayer(url) {
        if (hls) hls.destroy();
        if (url.includes('.m3u8') && Hls.isSupported()) {
            hls = new Hls(); hls.loadSource(url); hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else { video.src = url; video.play(); }
    }

    function tocarDireto(url, nome) {
        configurarPlayer(url);
        enviarParaTV(url, nome); // Envia para o Cast se já estiver pareado
        fecharGaveta();
    }

    function resetTimer() {
        controlesUI.classList.remove('invisivel');
        clearTimeout(timerUI);
        if (!document.getElementById('gaveta').classList.contains('ativa')) {
            timerUI = setTimeout(() => controlesUI.classList.add('invisivel'), 5000);
        }
    }

    function abrirGaveta() { document.getElementById('gaveta').classList.add('ativa'); controlesUI.classList.add('invisivel'); }
    function fecharGaveta() { document.getElementById('gaveta').classList.remove('ativa'); resetTimer(); }

    // --- CARREGAMENTO DA LISTA ---
    async function buscarLista() {
        try {
            const res = await fetch("https://raw.githubusercontent.com/roneiltonsouza/vidyou-iptv/main/lista.txt?t=" + Date.now());
            const link = (await res.text()).trim();
            const resM3U = await fetch(link);
            parseM3U(await resM3U.text());
        } catch (e) {}
    }

    function parseM3U(text) {
        const lines = text.split('\n'); listaCanais = [];
        for (let i = 0; i < lines.length; i++) {
            if (lines[i].includes('#EXTINF')) {
                const nome = lines[i].split(',')[1] || "Canal";
                const logo = lines[i].match(/tvg-logo="([^"]+)"/)?.[1] || '';
                const link = lines[i+1]?.trim();
                if (link?.startsWith('http')) listaCanais.push({ nome, logo, link });
            }
        }
        renderizar(listaCanais);
    }

    function renderizar(canais) {
        document.getElementById('itens-canais').innerHTML = canais.map(c => `
            <div class="canal-item" onclick="tocarDireto('${c.link}', '${c.nome}')">
                <img src="${c.logo}" class="canal-logo" onerror="this.src='https://via.placeholder.com/45'">
                <span>${c.nome}</span>
            </div>`).join('');
    }

    function filtrarGeral() {
        const termo = document.getElementById('search-input').value.toLowerCase();
        renderizar(listaCanais.filter(c => c.nome.toLowerCase().includes(termo)));
    }

    function toggleFS() { if (!document.fullscreenElement) wrapper.requestFullscreen(); else document.exitFullscreen(); }
    function carregarLocal(e) { if (e.target.files[0]) { video.src = URL.createObjectURL(e.target.files[0]); video.play(); } }

    wrapper.addEventListener('click', resetTimer);
    wrapper.addEventListener('touchstart', resetTimer);
    window.onload = () => { buscarLista(); resetTimer(); };
</script>
</body>
</html>
