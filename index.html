<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VidYou IPTV PRO - Oficial</title>
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { 
            padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; 
            background: linear-gradient(90deg, #4b0082, #ff4500); 
            border-bottom: 2px solid #ff4500; z-index: 100;
        }

        .btn-header { background: #000; border: 1px solid #ff4500; color: #ff4500; padding: 8px 12px; font-weight: bold; border-radius: 4px; cursor: pointer; }
        
        #player-wrapper { 
            position: relative; width: 100%; flex: 1; background: #000; 
            display: flex; align-items: center; justify-content: center; 
        }

        video { width: 100%; height: 100%; object-fit: contain; background: #000; }

        .seta-canais {
            position: absolute; top: 20px; left: 20px; z-index: 9999;
            background: rgba(255, 69, 0, 0.9); color: #fff; border: 2px solid #fff;
            width: 55px; height: 55px; border-radius: 50%; cursor: pointer; font-size: 22px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 10px #ff4500;
        }

        #gaveta {
            position: absolute; top: 0; left: -310px; width: 300px; height: 100%;
            background: rgba(10, 10, 10, 0.98); z-index: 10000; transition: 0.4s;
            border-right: 3px solid #ff4500; overflow-y: hidden; display: flex; flex-direction: column;
        }
        #gaveta.ativa { left: 0; }
        
        .search-container { padding: 10px; background: #1a1a1a; }
        #search-input { 
            width: 100%; padding: 12px; border-radius: 4px; border: 1px solid #ff4500; 
            background: #000; color: #fff; box-sizing: border-box; outline: none;
        }
        
        #itens-canais { flex: 1; overflow-y: auto; }
        .canal-item { padding: 12px; border-bottom: 1px solid #222; cursor: pointer; display: flex; align-items: center; gap: 12px; }
        .canal-item:hover { background: #ff4500; color: #000; font-weight: bold; }
        .canal-logo { width: 45px; height: 45px; border-radius: 4px; object-fit: contain; background: #fff; flex-shrink: 0; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: 900; color: #fff; font-size: 1.4rem;">VidYou <span style="color:#000">IPTV</span></div>
    <div style="display:flex; gap:10px;">
        <button class="btn-header" onclick="document.getElementById('file-input').click()">📁 GALERIA</button>
        <button class="btn-header" onclick="toggleFS()">⛶ TELA</button>
    </div>
</header>

<div id="player-wrapper">
    <video id="vid" controls autoplay playsinline></video>
    
    <button class="seta-canais" onclick="abrirGaveta()">▼</button>
    
    <div id="gaveta">
        <div style="padding:15px; background:#ff4500; color:#000; font-weight:bold; cursor:pointer; text-align:center;" onclick="fecharGaveta()">FECHAR MENU X</div>
        <div class="search-container">
            <input type="text" id="search-input" placeholder="🔍 Buscar canal..." onkeyup="filtrarGeral()">
        </div>
        <div id="itens-canais"></div>
    </div>
</div>

<input type="file" id="file-input" style="display:none" accept="video/*" onchange="carregarLocal(event)">

<script>
    const URL_GITHUB = "https://raw.githubusercontent.com/roneiltonsouza/vidyou-iptv/main/lista.txt";
    const video = document.getElementById('vid');
    let hls = null;
    let listaCanais = [];

    // BUSCA A LISTA DO SEU GITHUB (CORRIGIDO)
    async function buscarLista() {
        try {
            // 1. Pega o link da lista que está no lista.txt
            const resLink = await fetch(URL_GITHUB + "?t=" + Date.now());
            const linkReal = (await resLink.text()).trim();
            
            // 2. Pega o conteúdo da lista M3U
            const resM3U = await fetch(linkReal);
            const text = await resM3U.text();
            
            parseM3U(text);
        } catch (e) {
            console.error("Erro ao carregar lista. Verifique o link no GitHub.");
        }
    }

    function parseM3U(text) {
        const lines = text.split('\n');
        listaCanais = [];
        for (let i = 0; i < lines.length; i++) {
            if (lines[i].includes('#EXTINF')) {
                const info = lines[i];
                const nome = info.split(',')[1] || "Canal";
                const logo = info.match(/tvg-logo="([^"]+)"/)?.[1] || "";
                const url = lines[i+1]?.trim();
                if (url && url.startsWith('http')) {
                    listaCanais.push({ nome, logo, url });
                }
            }
        }
        renderizar(listaCanais);
    }

    function renderizar(canais) {
        const container = document.getElementById('itens-canais');
        container.innerHTML = canais.map(c => `
            <div class="canal-item" onclick="tocarDireto('${c.url}')">
                <img src="${c.logo}" class="canal-logo" onerror="this.src='https://via.placeholder.com/45'">
                <span>${c.nome}</span>
            </div>
        `).join('');
    }

    function tocarDireto(url) {
        if (hls) { hls.destroy(); }

        if (Hls.isSupported()) {
            hls = new Hls({
                enableWorker: true,
                lowLatencyMode: true,
                manifestLoadingMaxRetry: 5
            });
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = url;
            video.play();
        }
        fecharGaveta();
    }

    function carregarLocal(event) {
        const arquivo = event.target.files[0];
        if (arquivo) {
            if (hls) { hls.destroy(); hls = null; }
            video.src = URL.createObjectURL(arquivo);
            video.play();
        }
    }

    function filtrarGeral() {
        const termo = document.getElementById('search-input').value.toLowerCase();
        const filtrados = listaCanais.filter(c => c.nome.toLowerCase().includes(termo));
        renderizar(filtrados);
    }

    function abrirGaveta() { document.getElementById('gaveta').classList.add('ativa'); }
    function fecharGaveta() { document.getElementById('gaveta').classList.remove('ativa'); }
    function toggleFS() { if (!document.fullscreenElement) document.getElementById('player-wrapper').requestFullscreen(); else document.exitFullscreen(); }

    window.onload = buscarLista;
</script>
</body>
</html>
