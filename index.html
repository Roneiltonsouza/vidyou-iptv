<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VidYou IPTV PRO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.10/hls.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { padding: 15px; background: #0a0a0a; border-bottom: 2px solid #ff4500; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.5rem; font-weight: 900; color: #ff4500; }
        .gallery-btn { cursor: pointer; background: #ff4500; color: #000; padding: 5px 10px; border-radius: 5px; font-weight: bold; font-size: 0.9rem; border: none; }
        .player-container { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; }
        video { width: 100%; height: 100%; outline: none; }
        .status-bar { padding: 10px; font-size: 0.75rem; background: #111; color: #ff4500; text-transform: uppercase; border-bottom: 1px solid #222; text-align: center; }
        .content-area { flex: 1; overflow-y: auto; padding: 10px; background: #050505; }
        .list-item { background: #111; padding: 15px; margin-bottom: 8px; border-radius: 6px; cursor: pointer; border-left: 4px solid #ff4500; transition: 0.2s; }
        .list-item:active { background: #ff4500; color: #000; }
        .category-tabs { display: flex; background: #0a0a0a; padding: 5px; gap: 5px; }
        .tab-btn { flex: 1; padding: 10px; border: none; background: #1a1a1a; color: #fff; font-weight: bold; border-radius: 4px; }
        .tab-btn.active { background: #ff4500; }
    </style>
</head>
<body>

<header>
    <div class="logo">VIDYOU IPTV PRO</div>
    <button class="gallery-btn" onclick="document.getElementById('file-input').click()">📁 ABRIR GALERIA</button>
    <input type="file" id="file-input" style="display:none" accept="video/*">
</header>

<div class="player-container">
    <video id="main-video" controls playsinline></video>
</div>
<div class="status-bar" id="status">Aguardando Lista...</div>

<div class="category-tabs">
    <button class="tab-btn active" onclick="render('canais', this)">CANAIS</button>
    <button class="tab-btn" onclick="render('filmes', this)">FILMES</button>
    <button class="tab-btn" onclick="render('series', this)">SÉRIES</button>
</div>

<div class="content-area" id="lista"></div>

<script>
    const video = document.getElementById('main-video');
    const status = document.getElementById('status');
    const listaDiv = document.getElementById('lista');
    const fileInput = document.getElementById('file-input');
    
    let dados = { canais: [], filmes: [], series: [] };
    let hls = null;

    // --- PERMISSÃO PARA RECEBER DO PAINEL (POSTMESSAGE) ---
    window.addEventListener('message', function(event) {
        if (event.data && event.data.type === 'salvarLista') {
            const conteudoM3U = event.data.conteudo;
            const nomeLista = event.data.nome;
            
            // Lock: Salva no navegador para não sumir
            localStorage.setItem('iptv_lista_salva', conteudoM3U);
            localStorage.setItem('iptv_nome_lista', nomeLista);
            
            processarM3U(conteudoM3U);
            status.innerText = "Lista: " + nomeLista + " Sincronizada!";
        }
    });

    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const fileURL = URL.createObjectURL(file);
            play(fileURL, "Arquivo Local: " + file.name);
        }
    });

    // Função que processa o texto da lista M3U
    function processarM3U(text) {
        dados = { canais: [], filmes: [], series: [] };
        const linhas = text.split('\n');
        for (let i = 0; i < linhas.length; i++) {
            if (linhas[i].startsWith('#EXTINF')) {
                const info = linhas[i].toLowerCase();
                const nome = linhas[i].split(',')[1] || "Sem nome";
                const link = linhas[i+1]?.trim();
                if (!link) continue;

                const item = { nome, link };
                if (info.includes('movie') || info.includes('filme')) dados.filmes.push(item);
                else if (info.includes('serie')) dados.series.push(item);
                else dados.canais.push(item);
            }
        }
        render('canais');
    }

    async function carregarM3U(url) {
        try {
            status.innerText = "Sincronizando...";
            const response = await fetch(url);
            const text = await response.text();
            processarM3U(text);
            status.innerText = "Sincronizado!";
        } catch (e) {
            status.innerText = "Erro ao carregar lista.";
        }
    }

    function render(cat, btn) {
        if(btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
        listaDiv.innerHTML = '';
        if(dados[cat].length === 0) {
            listaDiv.innerHTML = '<div style="text-align:center; padding:20px; color:#555;">Nenhum conteúdo nesta categoria</div>';
        }
        dados[cat].forEach(item => {
            const div = document.createElement('div');
            div.className = 'list-item';
            div.innerText = item.nome;
            div.onclick = () => play(item.link, item.nome);
            listaDiv.appendChild(div);
        });
    }

    function play(url, nome) {
        status.innerText = "Reproduzindo: " + nome;
        if (hls) hls.destroy();
        
        if (url.startsWith('blob:')) {
            video.src = url;
            video.play();
        } else if (Hls.isSupported() && (url.includes('m3u8') || url.includes('.ts'))) {
            hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else {
            video.src = url;
            video.play();
        }
    }

    window.onload = () => {
        // Tenta carregar do Lock (Salvo anteriormente)
        const salva = localStorage.getItem('iptv_lista_salva');
        if (salva) {
            processarM3U(salva);
            status.innerText = "Lista Salva Carregada";
        }

        const urlParams = new URLSearchParams(window.location.search);
        const listaUrl = urlParams.get('lista');
        if (listaUrl) carregarM3U(decodeURIComponent(listaUrl));
    };
</script>
</body>
</html>
