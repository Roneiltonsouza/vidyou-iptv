<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VidYou IPTV PRO - Cast Edition</title>
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>
    
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { 
            padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; 
            background: linear-gradient(90deg, #4b0082, #ff4500); 
            border-bottom: 2px solid #ff4500; z-index: 100;
        }
        .btn-header { background: #000; border: 1px solid #ff4500; color: #ff4500; padding: 8px 12px; font-weight: bold; border-radius: 4px; cursor: pointer; }
        
        #player-wrapper { position: relative; width: 100%; flex: 1; background: #000; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: contain; pointer-events: none; }

        /* BOTÕES FLUTUANTES (Seta Esquerda / Cast Direita) */
        #setaPop, #castPop {
            position: absolute; top: 20px; z-index: 9999;
            width: 55px; height: 55px; border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.4s ease-in-out, visibility 0.4s;
            opacity: 1;
        }

        #setaPop { 
            left: 20px; background: rgba(255, 69, 0, 0.9); color: #fff; border: 2px solid #fff; 
            box-shadow: 0 0 10px #ff4500; font-size: 22px;
        }

        #castPop { 
            right: 20px; background: rgba(255, 255, 255, 0.1); border: 2px solid rgba(255,255,255,0.5);
            backdrop-filter: blur(5px);
        }

        /* Estilo do Launcher do Google */
        google-cast-launcher {
            width: 35px; height: 35px;
            --connected-color: #00ff00;
            --disconnected-color: #ffffff;
        }

        /* GAVETA ORIGINAL */
        #gaveta {
            position: absolute; top: 0; left: -310px; width: 300px; height: 100%;
            background: rgba(10, 10, 10, 0.98); z-index: 10000; transition: 0.4s;
            border-right: 3px solid #ff4500; display: flex; flex-direction: column;
        }
        #gaveta.ativa { left: 0; }
        .search-container { padding: 10px; background: #1a1a1a; }
        #search-input { width: 100%; padding: 12px; border-radius: 4px; border: 1px solid #ff4500; background: #000; color: #fff; outline: none; box-sizing: border-box; }
        #itens-canais { flex: 1; overflow-y: auto; }
        .canal-item { padding: 12px; border-bottom: 1px solid #222; cursor: pointer; display: flex; align-items: center; gap: 12px; }
        .canal-logo { width: 45px; height: 45px; border-radius: 4px; object-fit: contain; background: #fff; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: 900; color: #fff; font-size: 1.4rem;">VidYou <span style="color:#000">IPTV</span></div>
    <div style="display:flex; gap:10px;">
        <button class="btn-header" onclick="document.getElementById('file-input').click()">📁 GALERIA</button>
        <button class="btn-header" onclick="toggleFS()">⛶ TELA</button>
    </div>
</header>

<div id="player-wrapper">
    <video id="vid" autoplay playsinline></video>
    
    <button id="setaPop" onclick="abrirGaveta(event)">▼</button>

    <div id="castPop">
        <google-cast-launcher title="Transmitir para TV"></google-cast-launcher>
    </div>
    
    <div id="gaveta">
        <div style="padding:15px; background:#ff4500; color:#000; font-weight:bold; cursor:pointer; text-align:center;" onclick="fecharGaveta(event)">FECHAR MENU X</div>
        <div class="search-container"><input type="text" id="search-input" placeholder="🔍 Buscar canal..." onkeyup="filtrarGeral()"></div>
        <div id="itens-canais"></div>
    </div>
</div>

<input type="file" id="file-input" style="display:none" accept="video/*" onchange="carregarLocal(event)">

<script>
    const URL_GITHUB = "https://raw.githubusercontent.com/roneiltonsouza/vidyou-iptv/main/lista.txt";
    const video = document.getElementById('vid');
    const seta = document.getElementById('setaPop');
    const castBtn = document.getElementById('castPop');
    let hls = new Hls();
    let listaCanais = [];
    let timerInterface;
    let currentUrl = "";
    let currentTitle = "VidYou IPTV";

    // --- 1. SISTEMA DE INTERFACE (SUMIR APÓS 5 SEG) ---
    function gerenciarInterface() {
        seta.style.opacity = "1";
        seta.style.visibility = "visible";
        castBtn.style.opacity = "1";
        castBtn.style.visibility = "visible";

        clearTimeout(timerInterface);
        timerInterface = setTimeout(() => {
            if (!document.getElementById('gaveta').classList.contains('ativa')) {
                seta.style.opacity = "0";
                castBtn.style.opacity = "0";
                setTimeout(() => { 
                    if(seta.style.opacity === "0") {
                        seta.style.visibility = "hidden";
                        castBtn.style.visibility = "hidden";
                    }
                }, 400);
            }
        }, 5000); 
    }

    document.addEventListener('click', gerenciarInterface);
    document.addEventListener('touchstart', gerenciarInterface);

    // --- 2. SISTEMA GOOGLE CAST SDK ---
    window.__onGCastApiAvailable = function(isAvailable) {
        if (isAvailable) {
            const context = cast.framework.CastContext.getInstance();
            context.setOptions({
                receiverApplicationId: chrome.cast.media.DEFAULT_MEDIA_RECEIVER_APP_ID,
                autoJoinPolicy: chrome.cast.AutoJoinPolicy.ORIGIN_SCOPED
            });
        }
    };

    function enviarParaTV(url, title) {
        const castSession = cast.framework.CastContext.getInstance().getCurrentSession();
        if (castSession) {
            const mediaInfo = new chrome.cast.media.MediaInfo(url, 'application/x-mpegurl');
            const metadata = new chrome.cast.media.GenericMediaMetadata();
            metadata.title = title;
            metadata.subtitle = "Transmitindo via VidYou IPTV";
            mediaInfo.metadata = metadata;

            const request = new chrome.cast.media.LoadRequest(mediaInfo);
            castSession.loadMedia(request);
        }
    }

    // --- 3. BUSCA E PLAYER ---
    async function buscarLista() {
        try {
            const res = await fetch(URL_GITHUB + "?t=" + Date.now());
            const linkM3U = (await res.text()).trim();
            const resM3U = await fetch(linkM3U);
            const text = await resM3U.text();
            
            const lines = text.split('\n');
            listaCanais = [];
            for (let i = 0; i < lines.length; i++) {
                if (lines[i].includes('#EXTINF')) {
                    const nome = lines[i].split(',')[1] || "Canal";
                    const logo = lines[i].match(/tvg-logo="([^"]+)"/)?.[1] || "";
                    const url = lines[i+1]?.trim();
                    if (url && url.startsWith('http')) listaCanais.push({ nome, logo, url });
                }
            }
            renderizar(listaCanais);
        } catch (e) { console.error("Erro na lista"); }
    }

    function renderizar(canais) {
        document.getElementById('itens-canais').innerHTML = canais.map(c => `
            <div class="canal-item" onclick="tocarDireto('${c.url}', '${c.nome}', event)">
                <img src="${c.logo}" class="canal-logo" onerror="this.src='https://via.placeholder.com/45'">
                <span>${c.nome}</span>
            </div>
        `).join('');
    }

    function tocarDireto(url, nome, e) {
        e.stopPropagation();
        currentUrl = url;
        currentTitle = nome;

        if (Hls.isSupported()) {
            hls.destroy();
            hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                video.play();
                enviarParaTV(url, nome); // Envia automaticamente se o Cast estiver conectado
            });
        } else {
            video.src = url;
            video.play();
            enviarParaTV(url, nome);
        }
        fecharGaveta(e);
    }

    function carregarLocal(event) {
        const file = event.target.files[0];
        if (file) {
            hls.destroy();
            video.src = URL.createObjectURL(file);
            video.play();
        }
    }

    function abrirGaveta(e) { e.stopPropagation(); document.getElementById('gaveta').classList.add('ativa'); }
    function fecharGaveta(e) { if(e) e.stopPropagation(); document.getElementById('gaveta').classList.remove('ativa'); gerenciarInterface(); }
    function filtrarGeral() {
        const t = document.getElementById('search-input').value.toLowerCase();
        renderizar(listaCanais.filter(c => c.nome.toLowerCase().includes(t)));
    }
    function toggleFS() { 
        if (!document.fullscreenElement) document.getElementById('player-wrapper').requestFullscreen(); 
        else document.exitFullscreen(); 
    }

    window.onload = () => { buscarLista(); gerenciarInterface(); };
</script>
</body>
</html>
