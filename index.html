<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VidYou IPTV - Versão Estabilizada</title>
    
    <script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { 
            padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; 
            background: linear-gradient(90deg, #4b0082, #ff4500); 
            border-bottom: 2px solid #ff4500; z-index: 100;
        }
        .btn-header { background: #000; border: 1px solid #ff4500; color: #ff4500; padding: 8px 12px; font-weight: bold; border-radius: 4px; cursor: pointer; }
        #player-wrapper { position: relative; width: 100%; flex: 1; background: #000; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: contain; background: #000; }

        /* Botão Cast - Posicionamento que não interfere no toque do vídeo */
        .cast-display-btn {
            position: absolute; top: 15px; right: 15px; z-index: 100;
            background: rgba(0, 0, 0, 0.5); border-radius: 50%; padding: 5px;
        }
        google-cast-launcher { width: 35px; height: 35px; --disconnected-color: #fff; }

        .seta-canais {
            position: absolute; top: 15px; left: 15px; z-index: 100;
            background: #ff4500; color: #fff; border: 2px solid #fff;
            width: 50px; height: 50px; border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 20px;
        }

        #gaveta {
            position: absolute; top: 0; left: -310px; width: 300px; height: 100%;
            background: rgba(10, 10, 10, 0.95); z-index: 1000; transition: 0.3s;
            border-right: 2px solid #ff4500; display: flex; flex-direction: column;
        }
        #gaveta.ativa { left: 0; }
        .canal-item { padding: 12px; border-bottom: 1px solid #222; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .canal-logo { width: 40px; height: 40px; object-fit: contain; background: #fff; border-radius: 4px; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: 900; font-size: 1.2rem;">VidYou IPTV</div>
    <button class="btn-header" onclick="toggleFS()">⛶ TELA</button>
</header>

<div id="player-wrapper">
    <video id="vid" controls playsinline></video>
    
    <button class="seta-canais" onclick="document.getElementById('gaveta').classList.add('ativa')">▼</button>
    
    <div class="cast-display-btn">
        <google-cast-launcher></google-cast-launcher>
    </div>

    <div id="gaveta">
        <div style="padding:15px; background:#ff4500; text-align:center; font-weight:bold;" onclick="document.getElementById('gaveta').classList.remove('ativa')">FECHAR X</div>
        <div id="itens-canais" style="overflow-y: auto;"></div>
    </div>
</div>

<script>
    const URL_GITHUB = "https://raw.githubusercontent.com/roneiltonsouza/vidyou-iptv/main/lista.txt";
    const video = document.getElementById('vid');
    let hls = null;

    // --- CONFIGURAÇÃO DO CAST (MODO PASSIVO) ---
    window.__onGCastApiAvailable = function(isAvailable) {
        if (isAvailable) {
            cast.framework.CastContext.getInstance().setOptions({
                receiverApplicationId: chrome.cast.media.DEFAULT_MEDIA_RECEIVER_APP_ID,
                autoJoinPolicy: chrome.cast.AutoJoinPolicy.ORIGIN_SCOPED
            });
        }
    };

    // --- PLAYER DA VERSÃO ANTIGA (O QUE FUNCIONAVA) ---
    function configurarPlayer(url, titulo) {
        // Lógica de Cast Simplificada
        const castSession = cast.framework.CastContext.getInstance().getCurrentSession();
        if (castSession) {
            const mediaInfo = new chrome.cast.media.MediaInfo(url, 'application/x-mpegurl');
            const metadata = new chrome.cast.media.GenericMediaMetadata();
            metadata.title = titulo;
            mediaInfo.metadata = metadata;
            castSession.loadMedia(new chrome.cast.media.LoadRequest(mediaInfo));
        }

        if (hls) { hls.destroy(); hls = null; }

        if (Hls.isSupported()) {
            // Usei as configurações EXATAS da sua versão antiga
            hls = new Hls(); 
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
            
            // Tratamento de erro básico da versão antiga
            hls.on(Hls.Events.ERROR, (event, data) => {
                if (data.fatal) {
                    if (data.type === Hls.ErrorTypes.NETWORK_ERROR) hls.startLoad();
                    else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) hls.recoverMediaError();
                }
            });
        } else {
            video.src = url;
            video.play();
        }
    }

    // Carregamento simples da lista
    async function carregarLista() {
        try {
            const res = await fetch(URL_GITHUB);
            const link = (await res.text()).trim();
            const resM3U = await fetch(link);
            const text = await resM3U.text();
            
            const lines = text.split('\n');
            let canais = [];
            for(let i=0; i<lines.length; i++) {
                if(lines[i].includes('#EXTINF')) {
                    const nome = lines[i].split(',')[1] || "Canal";
                    const logo = lines[i].match(/tvg-logo="([^"]+)"/)?.[1] || "";
                    const url = lines[i+1]?.trim();
                    if(url && url.startsWith('http')) canais.push({nome, logo, url});
                }
            }
            
            document.getElementById('itens-canais').innerHTML = canais.map(c => `
                <div class="canal-item" onclick="configurarPlayer('${c.url}', '${c.nome}'); document.getElementById('gaveta').classList.remove('ativa')">
                    <img src="${c.logo}" class="canal-logo" onerror="this.src='https://via.placeholder.com/40'">
                    <span>${c.nome}</span>
                </div>
            `).join('');
        } catch(e) {}
    }

    function toggleFS() { if (!document.fullscreenElement) video.requestFullscreen(); else document.exitFullscreen(); }

    window.onload = carregarLista;
</script>
</body>
</html>
