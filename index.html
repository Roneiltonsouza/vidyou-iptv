<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VidYou IPTV PRO - V2</title>
    
    <script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { 
            padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; 
            background: linear-gradient(90deg, #4b0082, #ff4500); 
            border-bottom: 2px solid #ff4500; z-index: 100;
        }
        .btn-header { background: #000; border: 1px solid #ff4500; color: #ff4500; padding: 8px 12px; font-weight: bold; border-radius: 4px; cursor: pointer; }
        
        /* Estilo do Botão Cast */
        google-cast-launcher {
            width: 35px;
            height: 35px;
            --disconnected-color: white;
            --connected-color: #00ff00;
            cursor: pointer;
            vertical-align: middle;
        }

        #player-wrapper { position: relative; width: 100%; flex: 1; background: #000; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: contain; background: #000; }

        .seta-canais {
            position: absolute; top: 20px; left: 20px; z-index: 200;
            background: rgba(0, 0, 0, 0.7); color: #ff4500; border: 2px solid #ff4500;
            width: 50px; height: 50px; border-radius: 50%; cursor: pointer; font-size: 20px;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.5s ease; opacity: 1;
        }
        .seta-canais.invisivel { opacity: 0; pointer-events: none; }

        #gaveta {
            position: absolute; top: 0; left: -310px; width: 300px; height: 100%;
            background: rgba(10, 10, 10, 0.98); z-index: 2147483647; transition: 0.4s;
            border-right: 3px solid #ff4500; overflow-y: hidden; display: flex; flex-direction: column;
        }
        #gaveta.ativa { left: 0; }
        
        .search-container { padding: 10px; background: #1a1a1a; }
        #search-input { 
            width: 100%; padding: 10px; border-radius: 4px; border: 1px solid #ff4500; 
            background: #000; color: #fff; box-sizing: border-box; outline: none; margin-bottom: 10px;
        }
        
        .tabs-container { display: flex; gap: 5px; padding: 0 10px 10px; border-bottom: 1px solid #333; }
        .tab-btn { 
            flex: 1; padding: 8px 2px; font-size: 0.7rem; font-weight: bold; 
            background: #222; border: 1px solid #444; color: #aaa; border-radius: 4px; cursor: pointer;
            text-transform: uppercase;
        }
        .tab-btn.active { background: #ff4500; color: #000; border-color: #fff; }

        #itens-canais { flex: 1; overflow-y: auto; scroll-behavior: smooth; }
        .canal-item { padding: 12px; border-bottom: 1px solid #222; cursor: pointer; display: flex; align-items: center; gap: 12px; }
        .canal-item:hover { background: #ff4500; color: #000; font-weight: bold; }
        .canal-logo { width: 45px; height: 45px; border-radius: 4px; object-fit: contain; background: #fff; flex-shrink: 0; }
        
        #itens-canais::-webkit-scrollbar { width: 6px; }
        #itens-canais::-webkit-scrollbar-thumb { background: #ff4500; border-radius: 10px; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: 900; color: #fff; font-size: 1.4rem;">VidYou <span style="color:#000">IPTV</span></div>
    <div style="display:flex; gap:10px; align-items: center;">
        <google-cast-launcher title="Transmitir para TV"></google-cast-launcher>
        <button class="btn-header" onclick="toggleFS()">⛶ TELA</button>
        <button class="btn-header" onclick="document.getElementById('file-input').click()">📁 ABRIR</button>
    </div>
    <input type="file" id="file-input" style="display:none" onchange="carregarLocal(event)">
</header>

<div id="player-wrapper">
    <video id="vid" controls playsinline></video>
    <button class="seta-canais" id="botaoSeta" onclick="abrirGaveta()">▼</button>
    
    <div id="gaveta">
        <div style="padding:15px; background:#ff4500; color:#000; font-weight:bold; cursor:pointer; text-align:center;" onclick="fecharGaveta()">FECHAR MENU X</div>
        
        <div class="search-container">
            <input type="text" id="search-input" placeholder="🔍 Buscar..." onkeyup="filtrarGeral()">
        </div>

        <div class="tabs-container">
            <button class="tab-btn active" id="btn-tv" onclick="setTab('tv')">📺 TV Online</button>
            <button class="tab-btn" id="btn-filmes" onclick="setTab('filmes')">🎬 Filmes</button>
            <button class="tab-btn" id="btn-series" onclick="setTab('series')">🍿 Séries</button>
        </div>

        <div id="itens-canais"></div>
    </div>
</div>

<script>
    const URL_GITHUB = "https://raw.githubusercontent.com/roneiltonsouza/vidyou-iptv/main/lista.txt";
    const video = document.getElementById('vid');
    const wrapper = document.getElementById('player-wrapper');
    const seta = document.getElementById('botaoSeta');
    
    let hls = null;
    let listaCanais = [];
    let abaAtual = 'tv';
    let timerUI;

    // --- INTEGRAÇÃO GOOGLE CAST ---
    window.__onGCastApiAvailable = function(isAvailable) {
        if (isAvailable) {
            cast.framework.CastContext.getInstance().setOptions({
                receiverApplicationId: chrome.cast.media.DEFAULT_MEDIA_RECEIVER_APP_ID,
                autoJoinPolicy: chrome.cast.AutoJoinPolicy.ORIGIN_SCOPED
            });
        }
    };

    function enviarParaTV(url, nome) {
        const castSession = cast.framework.CastContext.getInstance().getCurrentSession();
        if (castSession) {
            const mediaInfo = new chrome.cast.media.MediaInfo(url, 'application/x-mpegurl');
            const metadata = new chrome.cast.media.GenericMediaMetadata();
            metadata.metadataType = chrome.cast.media.MetadataType.GENERIC;
            metadata.title = nome;
            metadata.subtitle = "VidYou IPTV - Transmitindo";
            mediaInfo.metadata = metadata;

            const request = new chrome.cast.media.LoadRequest(mediaInfo);
            castSession.loadMedia(request).then(
                () => console.log('Transmitindo para TV...'),
                (err) => console.error('Erro no Cast:', err)
            );
        }
    }

    // --- FUNÇÕES DO PLAYER ---
    function configurarPlayer(url, nome = "VidYou IPTV") {
        // Se estiver conectado ao Cast, envia direto para a TV também
        enviarParaTV(url, nome);

        if (hls) { hls.destroy(); }

        if (url.includes('.m3u8')) {
            if (Hls.isSupported()) {
                hls = new Hls({
                    maxBufferLength: 30,
                    maxMaxBufferLength: 60,
                    lowLatencyMode: true
                });
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.play();
            }
        } else {
            video.src = url;
            video.play();
        }
    }

    async function buscarLista() {
        try {
            const resLink = await fetch(URL_GITHUB + "?t=" + Date.now());
            const linkReal = (await resLink.text()).trim();
            
            if (linkReal.startsWith("http")) {
                const resM3U = await fetch(linkReal);
                const text = await resM3U.text();
                if(text.includes("#EXTM3U")) parseM3U(text);
            }
        } catch (e) { console.log("Erro ao carregar lista."); }
    }

    function parseM3U(text) {
        const lines = text.split('\n');
        listaCanais = [];
        for (let i = 0; i < lines.length; i++) {
            if (lines[i].includes('#EXTINF')) {
                const info = lines[i];
                const nome = info.split(',')[1] || "Sem Nome";
                const logo = info.match(/tvg-logo="([^"]+)"/)?.[1] || 'https://via.placeholder.com/45';
                const grupo = info.match(/group-title="([^"]+)"/)?.[1] || "";
                const link = lines[i+1]?.trim();

                if (link && link.startsWith('http')) {
                    let tipo = 'tv';
                    const lowerInfo = (nome + grupo).toLowerCase();
                    if (lowerInfo.includes('filmes') || lowerInfo.includes('cinema')) tipo = 'filmes';
                    else if (lowerInfo.includes('série') || lowerInfo.includes('series')) tipo = 'series';
                    listaCanais.push({ nome, logo, link, tipo });
                }
            }
        }
        filtrarGeral();
    }

    function setTab(tab) {
        abaAtual = tab;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + tab).classList.add('active');
        filtrarGeral();
    }

    function filtrarGeral() {
        const termo = document.getElementById('search-input').value.toLowerCase();
        const filtrados = listaCanais.filter(c => {
            const bateBusca = c.nome.toLowerCase().includes(termo);
            const bateAba = c.tipo === abaAtual;
            return bateBusca && bateAba;
        });
        renderizar(filtrados);
    }

    function renderizar(canais) {
        const container = document.getElementById('itens-canais');
        if (canais.length === 0) {
            container.innerHTML = `<div style="padding:20px; text-align:center; color:#666;">Nenhum conteúdo encontrado.</div>`;
            return;
        }
        container.innerHTML = canais.map((c) => `
            <div class="canal-item" onclick="configurarPlayer('${c.link}', '${c.nome.replace(/'/g, "")}'); fecharGaveta();">
                <img src="${c.logo}" class="canal-logo" onerror="this.src='https://via.placeholder.com/45'">
                <span>${c.nome}</span>
            </div>
        `).join('');
    }

    function resetTimer() {
        seta.classList.remove('invisivel');
        clearTimeout(timerUI);
        timerUI = setTimeout(() => {
            if(!document.getElementById('gaveta').classList.contains('ativa')) seta.classList.add('invisivel');
        }, 5000);
    }

    function toggleFS() {
        if (!document.fullscreenElement) wrapper.requestFullscreen();
        else document.exitFullscreen();
    }

    function abrirGaveta() { 
        document.getElementById('gaveta').classList.add('ativa'); 
        document.getElementById('search-input').focus();
    }
    
    function fecharGaveta() { 
        document.getElementById('gaveta').classList.remove('ativa'); 
        resetTimer(); 
    }

    function carregarLocal(e) { if (e.target.files[0]) { video.src = URL.createObjectURL(e.target.files[0]); video.play(); } }

    wrapper.addEventListener('click', resetTimer);
    wrapper.addEventListener('touchstart', resetTimer);

    window.onload = () => {
        buscarLista();
        setInterval(buscarLista, 60000);
        resetTimer();
    };
</script>
</body>
</html>
