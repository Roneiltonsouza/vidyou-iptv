<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VidYou IPTV PRO - V2</title>
    
    <script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { 
            padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; 
            background: linear-gradient(90deg, #4b0082, #ff4500); 
            border-bottom: 2px solid #ff4500; z-index: 10;
        }

        .btn-header { background: #000; border: 1px solid #ff4500; color: #ff4500; padding: 8px 12px; font-weight: bold; border-radius: 4px; cursor: pointer; }

        /* --- DISPLAY DO PLAYER --- */
        #player-wrapper { 
            position: relative; 
            width: 100%; 
            flex: 1; 
            background: #000; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }

        video { width: 100%; height: 100%; object-fit: contain; background: #000; }

        /* --- BOTÃO SCREEN MIRRORING (CAST) NA TELA DO VÍDEO --- */
        .cast-overlay {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 9999; /* Valor altíssimo para não ser coberto */
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #00ff00; /* Borda verde para você visualizar agora */
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        google-cast-launcher {
            width: 35px;
            height: 35px;
            --disconnected-color: #ffffff;
            --connected-color: #00ff00;
        }

        /* --- SETA POP-UP (CORRIGIDA) --- */
        .seta-canais {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 9999; /* Valor altíssimo */
            background: #ff4500; /* Cor laranja forte */
            color: #fff;
            border: 2px solid #fff;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.3s ease;
            box-shadow: 0 0 15px #ff4500;
        }

        .invisivel { opacity: 0 !important; pointer-events: none; }

        /* --- GAVETA / MENU --- */
        #gaveta {
            position: absolute; top: 0; left: -310px; width: 300px; height: 100%;
            background: rgba(10, 10, 10, 0.98); z-index: 10000; transition: 0.4s;
            border-right: 3px solid #ff4500; display: flex; flex-direction: column;
        }
        #gaveta.ativa { left: 0; }
        
        #itens-canais { flex: 1; overflow-y: auto; }
        .canal-item { padding: 12px; border-bottom: 1px solid #222; cursor: pointer; display: flex; align-items: center; gap: 12px; }
        .canal-item:hover { background: #ff4500; color: #000; }
        .canal-logo { width: 45px; height: 45px; object-fit: contain; background: #fff; border-radius: 4px; }

        .search-container { padding: 10px; }
        #search-input { width: 100%; padding: 10px; border: 1px solid #ff4500; background: #000; color: #fff; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: 900; color: #fff; font-size: 1.4rem;">VidYou <span style="color:#000">IPTV</span></div>
    <div style="display:flex; gap:10px;">
        <button class="btn-header" onclick="toggleFS()">⛶ TELA</button>
        <button class="btn-header" onclick="document.getElementById('file-input').click()">📁 ABRIR</button>
    </div>
    <input type="file" id="file-input" style="display:none" onchange="carregarLocal(event)">
</header>

<div id="player-wrapper" onmousemove="resetTimer()" onclick="resetTimer()" ontouchstart="resetTimer()">
    <video id="vid" controls playsinline></video>
    
    <button class="seta-canais" id="botaoSeta" onclick="abrirGaveta()">▼</button>
    
    <div class="cast-overlay" id="btnCast">
        <google-cast-launcher title="Transmitir para TV"></google-cast-launcher>
    </div>

    <div id="gaveta">
        <div style="padding:15px; background:#ff4500; color:#000; font-weight:bold; cursor:pointer; text-align:center;" onclick="fecharGaveta()">FECHAR MENU X</div>
        <div class="search-container">
            <input type="text" id="search-input" placeholder="🔍 Buscar..." onkeyup="filtrarGeral()">
        </div>
        <div id="itens-canais"></div>
    </div>
</div>

<script>
    const URL_GITHUB = "https://raw.githubusercontent.com/roneiltonsouza/vidyou-iptv/main/lista.txt";
    const video = document.getElementById('vid');
    const seta = document.getElementById('botaoSeta');
    const btnCast = document.getElementById('btnCast');
    let hls = null;
    let listaCanais = [];
    let timerUI;

    // --- INICIALIZAÇÃO GOOGLE CAST ---
    window.__onGCastApiAvailable = function(isAvailable) {
        if (isAvailable) {
            cast.framework.CastContext.getInstance().setOptions({
                receiverApplicationId: chrome.cast.media.DEFAULT_MEDIA_RECEIVER_APP_ID,
                autoJoinPolicy: chrome.cast.AutoJoinPolicy.ORIGIN_SCOPED
            });
        }
    };

    // --- FUNÇÃO PARA CARREGAR CANAL (AUTOMÁTICO) ---
    function configurarPlayer(url, nome) {
        // Envia para TV se estiver conectado
        const castSession = cast.framework.CastContext.getInstance().getCurrentSession();
        if (castSession) {
            const mediaInfo = new chrome.cast.media.MediaInfo(url, 'application/x-mpegurl');
            const metadata = new chrome.cast.media.GenericMediaMetadata();
            metadata.title = nome;
            mediaInfo.metadata = metadata;
            castSession.loadMedia(new chrome.cast.media.LoadRequest(mediaInfo));
        }

        // Carrega no player local
        if (hls) hls.destroy();
        if (url.includes('.m3u8')) {
            if (Hls.isSupported()) {
                hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
            } else {
                video.src = url;
                video.play();
            }
        } else {
            video.src = url;
            video.play();
        }
        fecharGaveta();
    }

    // --- CONTROLE DA SETA E BOTÕES (UI) ---
    function resetTimer() {
        // Quando toca na tela, MOSTRA TUDO
        seta.classList.remove('invisivel');
        btnCast.classList.remove('invisivel');
        
        clearTimeout(timerUI);
        
        // Esconde após 5 segundos de inatividade
        timerUI = setTimeout(() => {
            if(!document.getElementById('gaveta').classList.contains('ativa')) {
                seta.classList.add('invisivel');
                btnCast.classList.add('invisivel');
            }
        }, 5000);
    }

    function abrirGaveta() { 
        document.getElementById('gaveta').classList.add('ativa'); 
    }
    
    function fecharGaveta() { 
        document.getElementById('gaveta').classList.remove('ativa'); 
        resetTimer();
    }

    // --- BUSCA DE LISTA ---
    async function buscarLista() {
        try {
            const res = await fetch(URL_GITHUB + "?t=" + Date.now());
            const link = (await res.text()).trim();
            const resM3U = await fetch(link);
            const text = await resM3U.text();
            parseM3U(text);
        } catch (e) { console.log("Erro ao carregar lista."); }
    }

    function parseM3U(text) {
        const lines = text.split('\n');
        listaCanais = [];
        for (let i = 0; i < lines.length; i++) {
            if (lines[i].includes('#EXTINF')) {
                const nome = lines[i].split(',')[1] || "Sem Nome";
                const logo = lines[i].match(/tvg-logo="([^"]+)"/)?.[1] || '';
                const link = lines[i+1]?.trim();
                if (link) listaCanais.push({ nome, logo, link });
            }
        }
        renderizar(listaCanais);
    }

    function renderizar(canais) {
        const container = document.getElementById('itens-canais');
        container.innerHTML = canais.map(c => `
            <div class="canal-item" onclick="configurarPlayer('${c.link}', '${c.nome}')">
                <img src="${c.logo}" class="canal-logo" onerror="this.src='https://via.placeholder.com/45'">
                <span>${c.nome}</span>
            </div>
        `).join('');
    }

    function toggleFS() {
        if (!document.fullscreenElement) document.getElementById('player-wrapper').requestFullscreen();
        else document.exitFullscreen();
    }

    window.onload = () => { buscarLista(); resetTimer(); };
</script>
</body>
</html>
